{% extends "base.html" %}
{% block title %}Post a Job{% endblock %}
{% block content %}
<div class="container">
    <div class="card" style="max-width:900px;margin:0 auto;padding:18px">
        <h2>Post a New Job</h2>
        
        <form method="POST" action="{{ url_for('employer.create_job') }}">
            <div class="form-group">
                <label>Job Title *</label>
                <input type="text" name="title" required maxlength="120">
            </div>

            <div class="form-group">
                <label>Description *</label>
                <textarea name="description" rows="6" required minlength="100" maxlength="12000" placeholder="Describe the role responsibilities, benefits, and requirements (minimum 100 characters)..."></textarea>
            </div>

            <div class="form-row row">
                <div class="form-group">
                    <label>Category *</label>
                    <select name="category" required>
                        <option value="Technology">Technology</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Data-Science">Data Science</option>
                        <option value="Artificial Intelligence">Artificial Intelligence</option>
                        <option value="Retail">Retail</option>
                        <option value="Education">Education</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Finance & Banking">Finance & Banking</option>
                        <option value="Customer Service">Customer Service</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Construction & Trades">Construction & Trades</option>
                        <option value="Hospitality & Tourism">Hospitality & Tourism</option>
                        <option value="Marketing & Sales">Marketing & Sales</option>
                        <option value="Transportation & Logistics">Transportation & Logistics</option>
                        <option value="Art & Creative Design">Art & Creative Design</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Employment Type *</label>
                    <select name="employment_type" required>
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Contract">Contract</option>
                        <option value="Remote">Remote</option>
                    </select>
                </div>
            </div>

            <div class="form-row row">
                <div class="form-group">
                    <label>Min Salary (₦)</label>
                    <input type="number" name="salary_min" id="salary_min">
                </div>
                <div class="form-group">
                    <label>Max Salary (₦)</label>
                    <input type="number" name="salary_max" id="salary_max">
                </div>
            </div>

            <div class="form-group">
                <label for="skills_input_raw">Skills Required (Press Enter or Comma to add)</label>
                <div class="skills-tags-input-container" id="skills-tags-container">
                    <!-- Chips will be generated dynamically by JS -->
                    <input type="text" id="skills_input_raw" class="skills-tag-input-raw" placeholder="Add a skill (e.g. Python, SQL)...">
                </div>
                <!-- Hidden input to store comma-separated string -->
                <input type="hidden" name="skills_required" id="skills_hidden" value="">
                <small><i class="fas fa-info-circle"></i> Add skills required to enable the compatibility fit meter for job seekers.</small>
            </div>

            <div style="margin-top:12px">
                <button type="submit" class="btn btn-primary">Post Job</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
